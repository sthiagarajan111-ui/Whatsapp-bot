<style>
.conv-layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 60px); overflow: hidden; background: #fff; border: 1px solid #e2e8f0; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.conv-list { border-right: 1px solid #e2e8f0; overflow-y: auto; }
.conv-list-header { padding: 16px; border-bottom: 1px solid #e2e8f0; font-weight: 600; font-size: 14px; color: #1e293b; display: flex; align-items: center; justify-content: space-between; }
.conv-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; cursor: pointer; border-bottom: 1px solid #f1f5f9; transition: background .12s; }
.conv-item:hover { background: #f8fafc; }
.conv-item.active { background: #eff6ff; }
.conv-item-info { flex: 1; min-width: 0; }
.conv-item-name { font-weight: 600; font-size: 13px; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-item-preview { font-size: 12px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.conv-item-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.conv-item-time { font-size: 11px; color: #94a3b8; }
.unread-dot { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; }

.conv-panel { display: flex; flex-direction: column; }
.conv-lead-bar { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.conv-lead-bar-name { font-weight: 700; font-size: 14px; color: #1e293b; }
.conv-lead-bar-num { font-size: 12px; color: #64748b; }
.conv-lead-bar-actions { margin-left: auto; display: flex; gap: 8px; }

.chat-thread { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #f0f2f5; }
.msg-row { display: flex; }
.msg-row.inbound { justify-content: flex-start; }
.msg-row.outbound { justify-content: flex-end; }
.msg-bubble { max-width: 70%; padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.5; position: relative; }
.msg-row.inbound .msg-bubble { background: var(--white); border-radius: 2px 12px 12px 12px; box-shadow: var(--sh); }
.msg-row.outbound .msg-bubble { background: #d9fdd3; border-radius: 12px 2px 12px 12px; }
.msg-time { font-size: 10px; color: var(--text3); margin-top: 4px; text-align: right; }
.msg-icon { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
.date-sep { text-align: center; font-size: 11px; color: var(--text3); background: rgba(255,255,255,.7); padding: 3px 10px; border-radius: 20px; align-self: center; margin: 4px 0; }

.conv-footer { padding: 12px 16px; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; background: #fff; }
.conv-footer input { flex: 1; }

.conv-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text3); font-size: 14px; }

.live-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #22c55e;
  border-radius: 50%;
  margin-right: 6px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}
.live-label { font-size: 11px; color: #22c55e; font-weight: 600; letter-spacing: .5px; margin-right: 8px; }
</style>

<div style="padding: 20px 24px; height: 100%;">
  <div class="page-header">
    <div><div class="page-title">Conversations</div><div class="page-subtitle">Full WhatsApp chat history per lead</div></div>
  </div>
  <div class="conv-layout" id="convLayout">
    <div class="conv-list">
      <div class="conv-list-header">
        <span>Chats</span>
        <span id="convCount" style="font-size:12px;color:var(--text3)"></span>
      </div>
      <div id="convList"><div class="loading"><div class="spinner"></div> Loading...</div></div>
    </div>
    <div class="conv-panel" id="convPanel">
      <div class="conv-empty">Select a conversation to view messages</div>
    </div>
  </div>
</div>

<script>
// Resolve clientId from multiple sources
if (!window.__clientId) {
  try { window.__clientId = window.parent.__clientId; } catch(e) {}
}
if (!window.__clientId) {
  const m = window.location.pathname.match(/\/client-dashboard\/([^/]+)/);
  if (m) window.__clientId = m[1];
}
if (!window.__clientId) {
  window.__clientId = sessionStorage.getItem('clientId') || 'default';
}
(async function() {
  let conversations = [];
  let selectedNumber = null;
  let pollingInterval = null;
  let lastMessageCount = 0;
  let leadListInterval = null;

  async function loadConversations() {
    const convListEl = document.getElementById('convList');
    if (!convListEl) return; // not on conversations page
    try {
      const fresh = await shared.apiFetch('/api/conversations');
      // API returns an array (new format) or object with .conversations
      const list = Array.isArray(fresh) ? fresh : (fresh.conversations || []);
      const prevNums = new Set(conversations.map(c => c.wa_number));
      conversations = list;
      const convCountEl = document.getElementById('convCount');
      if (convCountEl) convCountEl.textContent = conversations.length + ' chats';
      renderConvList();
      const unread = conversations.filter(c => c.wa_number !== selectedNumber && !prevNums.has(c.wa_number)).length;
      if (unread > 0) {
        const badge = document.querySelector('[data-page="conversations"] .badge');
        if (badge) badge.textContent = unread;
      }
    } catch(e) {
      const convListEl2 = document.getElementById('convList');
      if (convListEl2) convListEl2.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>No conversations yet</p></div>';
    }
  }

  function startLeadListPolling() {
    if (leadListInterval) clearInterval(leadListInterval);
    leadListInterval = setInterval(async () => {
      if (!document.getElementById('convList')) { clearInterval(leadListInterval); return; }
      try {
        const fresh = await shared.apiFetch('/api/conversations');
        const list = Array.isArray(fresh) ? fresh : (fresh.conversations || []);
        conversations = list;
        const convCountEl = document.getElementById('convCount');
        if (convCountEl) convCountEl.textContent = list.length + ' chats';
        // Re-render list — renderConvList uses conversations variable and selectedNumber for highlight
        renderConvList();
      } catch(e) { /* silent */ }
    }, 5000); // 5s for LIVE detection
  }

  function startPolling(waNumber) {
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
      try {
        const msgs = await shared.apiFetch('/api/conversations/' + encodeURIComponent(waNumber));
        if (msgs.length !== lastMessageCount) {
          lastMessageCount = msgs.length;
          const thread = document.getElementById('chatThread');
          if (thread) {
            thread.innerHTML = renderMessages(msgs);
            thread.scrollTop = thread.scrollHeight;
          }
        }
      } catch(e) {
        console.warn('[Polling] Error:', e.message);
      }
    }, 3000);
  }

  function stopPolling() {
    if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
  }

  function renderConvList() {
    const el = document.getElementById('convList');
    if (!el) return;
    if (!conversations.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>No conversations yet</p></div>';
      return;
    }
    const now = new Date();
    el.innerHTML = conversations.map(c => {
      const lastTime = new Date(c.last_message_time || c.last_at || c.updated_at || 0);
      const minutesSince = (now - lastTime) / 60000;
      const isLive   = minutesSince < 2;
      const initials = (c.name || c.wa_number || '?').slice(0,2).toUpperCase();
      const colors = ['avatar-blue','avatar-green','avatar-purple','avatar-amber'];
      const cls = colors[(initials.charCodeAt(0)||0) % colors.length];
      const scoreColor = (c.score||0) >= 7 ? '#ef4444' : (c.score||0) >= 4 ? '#f59e0b' : '#94a3b8';
      const scoreLabel = (c.score||0) >= 7 ? 'HOT' : (c.score||0) >= 4 ? 'WARM' : 'COLD';
      const preview = (c.last_message || c.last_body || '').replace(/\n/g,' ').slice(0,45);
      return `<div class="conv-item${selectedNumber===c.wa_number?' active':''}"
        onclick="selectConv('${c.wa_number}')" data-wa="${c.wa_number}"
        style="${isLive ? 'border-left:3px solid #22c55e;background:#f0fdf4;' : 'border-left:3px solid transparent;'}">
        <div style="position:relative;flex-shrink:0">
          <div class="avatar ${cls}" style="width:40px;height:40px;font-size:14px">${initials}</div>
          ${isLive ? `<div style="position:absolute;bottom:0;right:0;width:10px;height:10px;
            background:#22c55e;border-radius:50%;border:2px solid #fff;
            animation:pulse-live 1.5s infinite"></div>` : ''}
        </div>
        <div class="conv-item-info">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="conv-item-name">${c.name || c.wa_number}</div>
            <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
              ${isLive ? `<span style="font-size:10px;font-weight:700;color:#22c55e;background:#f0fdf4;
                padding:1px 5px;border-radius:8px;border:1px solid #bbf7d0">LIVE</span>` : ''}
              <span class="conv-item-time">${shared.timeAgo(c.last_message_time || c.last_at)}</span>
            </div>
          </div>
          <div class="conv-item-preview">${c.last_direction==='outbound'?'🤖 ':''}${preview}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
            <span style="font-size:10px;font-weight:600;color:${scoreColor};
              background:${scoreColor}18;padding:1px 5px;border-radius:3px">
              ${scoreLabel} ${c.score||0}
            </span>
            <span style="font-size:10px;color:#94a3b8">${(c.pipeline_stage||'new').replace(/_/g,' ')}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  window.selectConv = async function(waNumber) {
    stopPolling();
    lastMessageCount = 0;
    selectedNumber = waNumber;
    renderConvList();
    const panel = document.getElementById('convPanel');
    panel.innerHTML = '<div class="conv-empty"><div class="spinner"></div></div>';
    try {
      const [messages, leadResp] = await Promise.all([
        shared.apiFetch('/api/conversations/' + encodeURIComponent(waNumber)),
        shared.apiFetch('/api/conversations/' + encodeURIComponent(waNumber) + '/lead').catch(() => null),
      ]);
      const lead = leadResp;
      let d = {};
      try { d = JSON.parse(lead?.data || '{}'); } catch(_) {}
      const hm = lead?.human_mode || 0;

      // Determine if this conversation is LIVE (message in last 2 min)
      const conv = conversations.find(c => c.wa_number === waNumber);
      const convLastTime = conv ? new Date(conv.last_message_time || conv.last_at || 0) : new Date(0);
      const isLiveConv = (new Date() - convLastTime) / 60000 < 2;

      lastMessageCount = messages.length;
      panel.innerHTML = `
        <div class="conv-lead-bar">
          ${shared.avatarInitials(lead?.name || waNumber)}
          <div>
            <div class="conv-lead-bar-name">${isLiveConv ? '<span class="live-dot"></span>' : ''}${lead?.name || waNumber}</div>
            <div class="conv-lead-bar-num">${waNumber} · ${d.area||''} · ${d.budget||''}</div>
          </div>
          ${isLiveConv ? '<span class="live-label">LIVE</span>' : ''}
          ${lead ? shared.scoreBadge(lead.score) : ''}
          ${lead ? shared.statusBadge(lead.status) : ''}
          <div class="conv-lead-bar-actions">
            <button onclick="clearLeadSession('${waNumber}')" style="font-size:11px;padding:4px 10px;border:1px solid #e2e8f0;border-radius:4px;background:#fff;color:#64748b;cursor:pointer;">↺ Reset Session</button>
            <button class="btn btn-sm" onclick="takeOver('${waNumber}', ${hm})" style="font-weight:600;background:${hm?'var(--red-l)':'var(--blue-l)'};color:${hm?'var(--red)':'var(--blue)'};border:1px solid ${hm?'var(--red)':'var(--blue)'}">
              ${hm ? 'Release' : '🎧 Take Over'}
            </button>
          </div>
        </div>
        <div class="chat-thread" id="chatThread">${renderMessages(messages)}</div>
        <div style="padding:10px 16px;border-top:1px solid var(--border);background:var(--bg);display:flex;flex-wrap:wrap;gap:8px;align-items:center">
          <button class="btn btn-sm btn-o" onclick="openSendProperty('${waNumber}')" style="font-size:11px">🏠 Send Property</button>
          <button class="btn btn-sm btn-o" onclick="openSendMedia('${waNumber}','image')" style="font-size:11px">📷 Send Image</button>
          <button class="btn btn-sm btn-o" onclick="openSendMedia('${waNumber}','video')" style="font-size:11px">🎥 Send Video</button>
          <button class="btn btn-sm btn-b" onclick="openSendMessage('${waNumber}')" style="font-size:11px">💬 Send Message</button>
        </div>
      `;
      const thread = document.getElementById('chatThread');
      thread.scrollTop = thread.scrollHeight;
      startPolling(waNumber);
    } catch(e) {
      panel.innerHTML = '<div class="conv-empty">Failed to load messages</div>';
    }
  };

  function renderMessages(messages) {
    if (!messages || !messages.length) return '<div class="date-sep">No messages yet</div>';
    let html = '';
    let lastDate = '';
    for (const m of messages) {
      const dateStr = new Date(m.created_at).toLocaleDateString('en-AE', { day:'2-digit', month:'short', year:'numeric' });
      const timeStr = new Date(m.created_at).toLocaleTimeString('en-AE', { hour:'2-digit', minute:'2-digit', hour12:true });
      if (dateStr !== lastDate) {
        html += `<div class="date-sep">${dateStr}</div>`;
        lastDate = dateStr;
      }
      const isOut = m.direction === 'outbound';
      const bodyText = (m.content || m.body || m.text || '').trim() || '[No content]';
      const formatted = bodyText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      const senderLabel = isOut
        ? `<div class="msg-icon">${m.message_type === 'audio' ? '🎙️ Voice' : '🤖 Bot'}</div>`
        : (m.message_type === 'audio' ? '<div class="msg-icon">🎙️ Voice</div>' : '');
      html += `<div class="msg-row ${m.direction || 'inbound'}">
        <div class="msg-bubble">
          ${senderLabel}
          ${formatted}
          <div class="msg-time">${timeStr}</div>
        </div>
      </div>`;
    }
    return html;
  }

  window.clearLeadSession = async function(waNumber) {
    if (!confirm('Reset this lead session? Bot will treat next message as new.')) return;
    try {
      await fetch(`/api/sessions/${waNumber}/clear`, {
        method: 'POST',
        headers: { 'x-client-id': window.__clientId || 'default' }
      });
      shared.showToast('Session reset — next message will start fresh');
    } catch(e) {
      alert('Connection error');
    }
  };

  window.takeOver = async function(waNumber, currentMode) {
    const endpoint = currentMode ? 'release' : 'takeover';
    try {
      const r = await fetch(`/api/leads/${waNumber}/${endpoint}`, {method:'POST'});
      const d = await r.json();
      if (d.success) {
        shared.showToast(currentMode ? 'Released to bot' : 'Takeover active — messages forwarded to owner');
        selectConv(waNumber);
      } else {
        alert('Error: ' + (d.message || 'Unknown error'));
      }
    } catch(e) {
      alert('Connection error');
    }
  };

  window.openSendMedia = async function(waNumber, mediaType) {
    const url = prompt(`Enter ${mediaType} URL:`);
    if (!url) return;
    const caption = prompt('Caption (optional):') || '';
    try {
      const r = await fetch(`/api/leads/${waNumber}/send-media`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ mediaUrl: url, caption, mediaType })
      });
      const d = await r.json();
      if (d.success) { shared.showToast('Media sent!'); selectConv(waNumber); }
      else alert('Error: ' + (d.error || 'Send failed'));
    } catch(e) { alert('Connection error'); }
  };

  window.openSendProperty = async function(waNumber) {
    try {
      const listings = await shared.apiFetch('/api/listings');
      if (!listings.length) { alert('No listings available. Add listings in Settings first.'); return; }
      const opts = listings.map((l,i) => `${i+1}. ${l.title} — AED ${(l.price||0).toLocaleString()} (${l.area})`).join('\n');
      const choice = prompt(`Select listing number:\n\n${opts}`);
      const idx = parseInt(choice) - 1;
      if (isNaN(idx) || !listings[idx]) return;
      const r = await fetch(`/api/leads/${waNumber}/send-property`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ listingId: listings[idx].id })
      });
      const d = await r.json();
      if (d.success) { shared.showToast('Property card sent!'); selectConv(waNumber); }
      else alert('Error: ' + (d.error || 'Send failed'));
    } catch(e) { alert('Connection error'); }
  };

  window.openSendMessage = async function(waNumber) {
    const msg = prompt('Enter message to send:');
    if (!msg) return;
    try {
      const r = await fetch(`/api/leads/${waNumber}/message`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ message: msg })
      });
      const d = await r.json();
      if (d.success || d.ok) { shared.showToast('Message sent!'); selectConv(waNumber); }
      else alert('Error: ' + (d.error || 'Send failed'));
    } catch(e) { alert('Connection error'); }
  };

  await loadConversations();
  startLeadListPolling();
})();
</script>
