<style>
.conv-layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 60px); overflow: hidden; background: var(--white); border-radius: 12px; border: 1px solid var(--border); }
.conv-list { border-right: 1px solid var(--border); overflow-y: auto; }
.conv-list-header { padding: 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
.conv-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .12s; }
.conv-item:hover { background: var(--bg); }
.conv-item.active { background: var(--blue-l); }
.conv-item-info { flex: 1; min-width: 0; }
.conv-item-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-item-preview { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.conv-item-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.conv-item-time { font-size: 11px; color: var(--text3); }
.unread-dot { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; }

.conv-panel { display: flex; flex-direction: column; }
.conv-lead-bar { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.conv-lead-bar-name { font-weight: 700; font-size: 14px; }
.conv-lead-bar-num { font-size: 12px; color: var(--text2); }
.conv-lead-bar-actions { margin-left: auto; display: flex; gap: 8px; }

.chat-thread { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #f0f2f5; }
.msg-row { display: flex; }
.msg-row.inbound { justify-content: flex-start; }
.msg-row.outbound { justify-content: flex-end; }
.msg-bubble { max-width: 70%; padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.5; position: relative; }
.msg-row.inbound .msg-bubble { background: var(--white); border-radius: 2px 12px 12px 12px; box-shadow: var(--sh); }
.msg-row.outbound .msg-bubble { background: #d9fdd3; border-radius: 12px 2px 12px 12px; }
.msg-time { font-size: 10px; color: var(--text3); margin-top: 4px; text-align: right; }
.msg-icon { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
.date-sep { text-align: center; font-size: 11px; color: var(--text3); background: rgba(255,255,255,.7); padding: 3px 10px; border-radius: 20px; align-self: center; margin: 4px 0; }

.conv-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--white); }
.conv-footer input { flex: 1; }

.conv-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text3); font-size: 14px; }
</style>

<div style="padding: 20px 24px; height: 100%;">
  <div class="page-header">
    <div><div class="page-title">Conversations</div><div class="page-subtitle">Full WhatsApp chat history per lead</div></div>
  </div>
  <div class="conv-layout" id="convLayout">
    <div class="conv-list">
      <div class="conv-list-header">
        <span>Chats</span>
        <span id="convCount" style="font-size:12px;color:var(--text3)"></span>
      </div>
      <div id="convList"><div class="loading"><div class="spinner"></div> Loading...</div></div>
    </div>
    <div class="conv-panel" id="convPanel">
      <div class="conv-empty">Select a conversation to view messages</div>
    </div>
  </div>
</div>

<script>
(async function() {
  let conversations = [];
  let selectedNumber = null;

  async function loadConversations() {
    try {
      conversations = await shared.apiFetch('/api/conversations');
      document.getElementById('convCount').textContent = conversations.length + ' chats';
      renderConvList();
    } catch(e) {
      document.getElementById('convList').innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>No conversations yet</p></div>';
    }
  }

  function renderConvList() {
    const el = document.getElementById('convList');
    if (!conversations.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>No conversations yet</p></div>';
      return;
    }
    el.innerHTML = conversations.map(c => {
      const initials = (c.name || c.wa_number || '?').slice(0,2).toUpperCase();
      const colors = ['avatar-blue','avatar-green','avatar-purple','avatar-amber'];
      const cls = colors[(initials.charCodeAt(0)||0) % colors.length];
      return `<div class="conv-item${selectedNumber===c.wa_number?' active':''}" onclick="selectConv('${c.wa_number}')">
        <div class="avatar ${cls}" style="width:40px;height:40px;font-size:14px">${initials}</div>
        <div class="conv-item-info">
          <div class="conv-item-name">${c.name || c.wa_number}</div>
          <div class="conv-item-preview">${c.last_direction==='outbound'?'🤖 ':''}${(c.last_message||'').slice(0,50)}</div>
        </div>
        <div class="conv-item-meta">
          <div class="conv-item-time">${shared.timeAgo(c.last_at)}</div>
        </div>
      </div>`;
    }).join('');
  }

  window.selectConv = async function(waNumber) {
    selectedNumber = waNumber;
    renderConvList();
    const panel = document.getElementById('convPanel');
    panel.innerHTML = '<div class="conv-empty"><div class="spinner"></div></div>';
    try {
      const [messages, leadResp] = await Promise.all([
        shared.apiFetch('/api/conversations/' + encodeURIComponent(waNumber)),
        shared.apiFetch('/api/conversations/' + encodeURIComponent(waNumber) + '/lead').catch(() => null),
      ]);
      const lead = leadResp;
      let d = {};
      try { d = JSON.parse(lead?.data || '{}'); } catch(_) {}

      panel.innerHTML = `
        <div class="conv-lead-bar">
          ${shared.avatarInitials(lead?.name || waNumber)}
          <div>
            <div class="conv-lead-bar-name">${lead?.name || waNumber}</div>
            <div class="conv-lead-bar-num">${waNumber} · ${d.area||''} · ${d.budget||''}</div>
          </div>
          ${lead ? shared.scoreBadge(lead.score) : ''}
          ${lead ? shared.statusBadge(lead.status) : ''}
          <div class="conv-lead-bar-actions">
            <button class="btn btn-secondary btn-sm" onclick="takeOver('${waNumber}')">🎧 Take Over</button>
          </div>
        </div>
        <div class="chat-thread" id="chatThread">${renderMessages(messages)}</div>
      `;
      const thread = document.getElementById('chatThread');
      thread.scrollTop = thread.scrollHeight;
    } catch(e) {
      panel.innerHTML = '<div class="conv-empty">Failed to load messages</div>';
    }
  };

  function renderMessages(messages) {
    if (!messages.length) return '<div class="date-sep">No messages yet</div>';
    let html = '';
    let lastDate = '';
    for (const m of messages) {
      const d = (m.created_at||'').slice(0,10);
      if (d !== lastDate) { html += `<div class="date-sep">${d}</div>`; lastDate = d; }
      const isOut = m.direction === 'outbound';
      const icon = isOut ? '<div class="msg-icon">🤖 Bot</div>' : '';
      const voice = m.message_type === 'audio' ? '🎙️ ' : '';
      html += `<div class="msg-row ${m.direction}">
        <div class="msg-bubble">
          ${icon}
          ${voice}${m.content || '(media)'}
          <div class="msg-time">${shared.formatDate(m.created_at)}</div>
        </div>
      </div>`;
    }
    return html;
  }

  window.takeOver = function(waNumber) {
    const owner = prompt('Owner WhatsApp number (to send TAKE command):');
    if (owner) shared.showToast('Send "TAKE ' + waNumber + '" from ' + owner + ' on WhatsApp to take over.');
  };

  await loadConversations();
})();
</script>
