<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
.analytics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
.analytics-grid .wide { grid-column: span 2; }
.chart-card { background: var(--white); border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
.chart-title { font-weight: 600; font-size: 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card { background: var(--white); border-radius: 12px; border: 1px solid var(--border); padding: 16px 18px; }
.kpi-val { font-size: 22px; font-weight: 700; color: var(--text); }
.kpi-lbl { font-size: 12px; color: var(--text3); margin-top: 4px; }
.date-filter { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.date-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; }
.date-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.heatmap { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; }
.heatmap-cell { height: 18px; border-radius: 3px; background: var(--border); position: relative; }
.heatmap-label { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; margin-top: 4px; }
.heatmap-label span { font-size: 9px; color: var(--text3); text-align: center; }
</style>

<div style="padding: 20px 24px;">
  <div class="page-header">
    <div><div class="page-title">Analytics</div><div class="page-subtitle">Deep performance insights</div></div>
    <div class="date-filter" id="dateFilter">
      <button class="date-btn" onclick="setRange(1, this)">Today</button>
      <button class="date-btn" onclick="setRange(7, this)">7 Days</button>
      <button class="date-btn active" onclick="setRange(30, this)">30 Days</button>
      <button class="date-btn" onclick="setRange(90, this)">90 Days</button>
      <button class="date-btn" onclick="setRange(9999, this)">All Time</button>
      <input type="date" id="fromDate" style="width:130px"> <span>—</span>
      <input type="date" id="toDate" style="width:130px">
      <button class="btn btn-primary btn-sm" onclick="loadCustomRange()">Apply</button>
    </div>
  </div>

  <div class="kpi-row" id="kpiRow">
    <div class="loading" style="grid-column:span 5"><div class="spinner"></div> Loading...</div>
  </div>

  <div class="analytics-grid" id="analyticsGrid">
    <div class="loading"><div class="spinner"></div> Loading charts...</div>
  </div>

  <!-- Agent Leaderboard -->
  <div class="chart-card" style="margin-top:20px">
    <div class="chart-title">🏆 Agent Performance Leaderboard</div>
    <div id="agentLeaderboard"><div class="loading"><div class="spinner"></div> Loading...</div></div>
  </div>
</div>

<script>
(async function() {
  let currentRange = 30;
  let allLeads = [];
  const charts = {};

  // Load all leads once
  try {
    allLeads = await shared.apiFetch('/api/leads?status=all&limit=10000');
    if (!Array.isArray(allLeads)) allLeads = allLeads.leads || allLeads.data || [];
  } catch(e) { allLeads = []; }

  window.setRange = function(days, btn) {
    currentRange = days;
    document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    loadAnalytics(currentRange);
  };

  window.loadCustomRange = function() {
    const from = document.getElementById('fromDate').value;
    const to = document.getElementById('toDate').value;
    if (!from && !to) return;
    document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
    const fromDate = from ? new Date(from) : new Date(0);
    const toDate = to ? new Date(to + 'T23:59:59.999Z') : new Date();
    const filtered = allLeads.filter(l => {
      const d = new Date(l.created_at);
      return d >= fromDate && d <= toDate;
    });
    renderAll(filtered, null);
  };

  function loadAnalytics(days) {
    const fromDate = new Date(Date.now() - days * 86400000);
    const filtered = allLeads.filter(l => new Date(l.created_at) >= fromDate);
    renderAll(filtered, days);
  }

  function computeStats(filtered, days) {
    const total = filtered.length;
    const converted = filtered.filter(l => l.status === 'converted').length;
    const avgScore = total ? Math.round(filtered.reduce((s, l) => s + (l.score || 0), 0) / total * 10) / 10 : 0;
    const conversionRate = total ? Math.round(converted / total * 100) : 0;

    const byArea = {}, byBudget = {}, byInterest = {}, scoreDistribution = {}, hourly = {};
    let arabic = 0, english = 0, voice = 0, text = 0;

    for (const l of filtered) {
      const d = l.data || {};
      if (d.area)   byArea[d.area]       = (byArea[d.area] || 0) + 1;
      if (d.budget) byBudget[d.budget]   = (byBudget[d.budget] || 0) + 1;
      if (d.intent) byInterest[d.intent] = (byInterest[d.intent] || 0) + 1;
      const sc = l.score || 0;
      scoreDistribution[sc] = (scoreDistribution[sc] || 0) + 1;
      if (l.language === 'ar') arabic++; else english++;
      if (d.source === 'voice') voice++; else text++;
      const h = parseInt((l.created_at || '').slice(11, 13)) || 0;
      hourly[h] = (hourly[h] || 0) + 1;
    }

    const bestArea = Object.entries(byArea).sort((a, b) => b[1] - a[1])[0]?.[0] || '—';
    const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const byDay = {};
    filtered.forEach(l => { const dw = DAYS[new Date(l.created_at).getDay()]; byDay[dw] = (byDay[dw] || 0) + 1; });
    const bestDay = Object.entries(byDay).sort((a, b) => b[1] - a[1])[0]?.[0] || '—';

    // Trend: day-by-day for the period (cap at 90 days for readability)
    const trendDays = days && days < 9999 ? Math.min(days, 90) : 30;
    const trendLabels = [], trendCounts = [];
    for (let i = trendDays - 1; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds = d.toISOString().slice(0, 10);
      trendLabels.push(ds.slice(5));
      trendCounts.push(filtered.filter(l => l.created_at?.startsWith(ds)).length);
    }

    return { total, conversionRate, avgScore, bestArea, bestDay, byArea, byBudget, byInterest,
             arabic, english, voice, text, hourly, scoreDistribution,
             trend: { labels: trendLabels, counts: trendCounts } };
  }

  function renderAll(filtered, days) {
    const d = computeStats(filtered, days);
    renderKPIs(d);
    renderCharts(d);
  }

  function renderKPIs(d) {
    document.getElementById('kpiRow').innerHTML = `
      <div class="kpi-card"><div class="kpi-val">${d.total||0}</div><div class="kpi-lbl">Total Leads</div></div>
      <div class="kpi-card"><div class="kpi-val">${d.conversionRate||0}%</div><div class="kpi-lbl">Conversion Rate</div></div>
      <div class="kpi-card"><div class="kpi-val">${d.avgScore||0}</div><div class="kpi-lbl">Avg Lead Score</div></div>
      <div class="kpi-card"><div class="kpi-val">${d.bestArea||'—'}</div><div class="kpi-lbl">Top Area</div></div>
      <div class="kpi-card"><div class="kpi-val">${d.bestDay||'—'}</div><div class="kpi-lbl">Best Day</div></div>
    `;
  }

  function renderCharts(d) {
    const grid = document.getElementById('analyticsGrid');
    grid.innerHTML = `
      <div class="chart-card wide"><div class="chart-title">📈 Leads Trend</div><canvas id="cTrend" height="120"></canvas></div>
      <div class="chart-card"><div class="chart-title">🏠 Leads by Area</div><canvas id="cArea" height="180"></canvas></div>
      <div class="chart-card"><div class="chart-title">💰 Budget Distribution</div><canvas id="cBudget" height="180"></canvas></div>
      <div class="chart-card"><div class="chart-title">🎯 Interest Type</div><canvas id="cInterest" height="180"></canvas></div>
      <div class="chart-card"><div class="chart-title">🌐 Language Split</div><canvas id="cLang" height="180"></canvas></div>
      <div class="chart-card"><div class="chart-title">⭐ Score Distribution</div><canvas id="cScore" height="180"></canvas></div>
      <div class="chart-card"><div class="chart-title">🎙️ Voice vs Text</div><canvas id="cSource" height="180"></canvas></div>
      <div class="chart-card wide"><div class="chart-title">🕐 Hourly Activity Heatmap</div>
        <div class="heatmap" id="heatmap"></div>
        <div class="heatmap-label">${Array.from({length:24},(_,i)=>`<span>${i}h</span>`).join('')}</div>
      </div>
    `;
    makeChart('cTrend','line', d.trend?.labels||[], [{label:'Leads',data:d.trend?.counts||[],borderColor:'#3D7FFA',backgroundColor:'rgba(61,127,250,.1)',tension:.3,fill:true}]);
    makeChart('cArea','bar', Object.keys(d.byArea||{}), [{label:'Leads',data:Object.values(d.byArea||{}),backgroundColor:'#3D7FFA'}], {indexAxis:'y'});
    makeChart('cBudget','doughnut', Object.keys(d.byBudget||{}), [{data:Object.values(d.byBudget||{}),backgroundColor:['#3D7FFA','#06C8E0','#10B981','#F59E0B','#EF4444']}]);
    makeChart('cInterest','doughnut', Object.keys(d.byInterest||{}), [{data:Object.values(d.byInterest||{}),backgroundColor:['#7C3AED','#10B981','#F59E0B']}]);
    makeChart('cLang','doughnut', ['Arabic','English'], [{data:[d.arabic||0,d.english||0],backgroundColor:['#7C3AED','#3D7FFA']}]);
    makeChart('cScore','bar', Object.keys(d.scoreDistribution||{}), [{label:'Leads',data:Object.values(d.scoreDistribution||{}),backgroundColor:'#10B981'}]);
    makeChart('cSource','doughnut', ['Voice','Text'], [{data:[d.voice||0,d.text||0],backgroundColor:['#06C8E0','#3D7FFA']}]);
    // Heatmap
    const hm = document.getElementById('heatmap');
    const hourCounts = d.hourly||{};
    const maxH = Math.max(...Object.values(hourCounts),1);
    hm.innerHTML = Array.from({length:24},(_,h)=>{
      const v=hourCounts[h]||0;
      const intensity = Math.round((v/maxH)*100);
      return `<div class="heatmap-cell" style="background:rgba(61,127,250,${intensity/100})" title="${h}:00 — ${v} leads"></div>`;
    }).join('');
  }

  function makeChart(id, type, labels, datasets, extra={}) {
    if (charts[id]) charts[id].destroy();
    const ctx = document.getElementById(id)?.getContext('2d');
    if (!ctx) return;
    charts[id] = new Chart(ctx, { type, data:{labels,datasets}, options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:type==='bar'||type==='line'?{y:{beginAtZero:true}}:undefined,...extra} });
  }

  // Default: last 30 days
  loadAnalytics(currentRange);

  // Agent Leaderboard
  (async function loadLeaderboard() {
    const el = document.getElementById('agentLeaderboard');
    try {
      const agents = await shared.apiFetch('/api/agents/performance');
      if (!agents.length) {
        el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px">Add agents in <a href="#settings" style="color:var(--blue)">Settings</a> to track performance</div>';
        return;
      }
      const medals = ['🥇','🥈','🥉'];
      el.innerHTML = `<table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--bg)">
          ${['Rank','Agent','Leads','HOT','Converted','Win%','Avg Score'].map(h=>`<th style="padding:8px 12px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:2px solid var(--border)">${h}</th>`).join('')}
        </tr></thead>
        <tbody>${agents.map(a => {
          const winColor = a.conversionRate >= 20 ? 'var(--green)' : a.conversionRate >= 10 ? 'var(--amber)' : 'var(--red)';
          const medal = medals[a.rank-1] || `#${a.rank}`;
          return `<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:10px 12px;font-size:13px">${medal}</td>
            <td style="padding:10px 12px;font-weight:600;font-size:13px">${a.name}</td>
            <td style="padding:10px 12px;font-size:13px">${a.totalLeads}</td>
            <td style="padding:10px 12px;font-size:13px;color:var(--red)">${a.hotLeads}</td>
            <td style="padding:10px 12px;font-size:13px;color:var(--green)">${a.converted}</td>
            <td style="padding:10px 12px">
              <div style="display:flex;align-items:center;gap:8px">
                <div style="flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;min-width:60px">
                  <div style="height:100%;width:${Math.min(a.conversionRate,100)}%;background:${winColor};border-radius:3px"></div>
                </div>
                <span style="font-size:12px;font-weight:700;color:${winColor};min-width:32px">${a.conversionRate}%</span>
              </div>
            </td>
            <td style="padding:10px 12px;font-size:13px;color:var(--purple)">${a.avgScore}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
    } catch(e) {
      el.innerHTML = '<div style="padding:16px;color:var(--text3)">Failed to load agent data</div>';
    }
  })();
})();
</script>
