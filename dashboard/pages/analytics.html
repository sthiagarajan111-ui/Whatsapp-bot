<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
.analytics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
.analytics-grid .wide { grid-column: span 2; }
.chart-card { background: var(--white); border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
.chart-title { font-weight: 600; font-size: 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card { background: var(--white); border-radius: 12px; border: 1px solid var(--border); padding: 16px 18px; }
.kpi-val { font-size: 22px; font-weight: 700; color: var(--text); }
.kpi-lbl { font-size: 12px; color: var(--text3); margin-top: 4px; }
.date-filter { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.date-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; }
.date-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.heatmap { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; }
.heatmap-cell { height: 18px; border-radius: 3px; background: var(--border); position: relative; }
.heatmap-label { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; margin-top: 4px; }
.heatmap-label span { font-size: 9px; color: var(--text3); text-align: center; }
</style>

<div style="padding: 20px 24px;">
  <div class="page-header">
    <div><div class="page-title">Analytics</div><div class="page-subtitle">Deep performance insights</div></div>
    <div class="date-filter" id="dateFilter">
      <button class="date-btn" onclick="setRange('today')">Today</button>
      <button class="date-btn active" onclick="setRange('7d')">7 Days</button>
      <button class="date-btn" onclick="setRange('30d')">30 Days</button>
      <button class="date-btn" onclick="setRange('90d')">90 Days</button>
      <button class="date-btn" onclick="setRange('all')">All Time</button>
      <input type="date" id="fromDate" style="width:130px"> <span>—</span>
      <input type="date" id="toDate" style="width:130px">
      <button class="btn btn-primary btn-sm" onclick="loadCustomRange()">Apply</button>
    </div>
  </div>

  <div class="kpi-row" id="kpiRow">
    <div class="loading" style="grid-column:span 5"><div class="spinner"></div> Loading...</div>
  </div>

  <div class="analytics-grid" id="analyticsGrid">
    <div class="loading"><div class="spinner"></div> Loading charts...</div>
  </div>
</div>

<script>
(async function() {
  let currentFrom = null, currentTo = null;
  const charts = {};

  window.setRange = function(range) {
    document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    const now = new Date();
    if (range === 'today') { currentFrom = toISO(now); currentTo = toISO(now); }
    else if (range === '7d') { currentFrom = toISO(addDays(now,-7)); currentTo = toISO(now); }
    else if (range === '30d') { currentFrom = toISO(addDays(now,-30)); currentTo = toISO(now); }
    else if (range === '90d') { currentFrom = toISO(addDays(now,-90)); currentTo = toISO(now); }
    else { currentFrom = null; currentTo = null; }
    loadAnalytics();
  };

  window.loadCustomRange = function() {
    currentFrom = document.getElementById('fromDate').value || null;
    currentTo = document.getElementById('toDate').value || null;
    loadAnalytics();
  };

  function toISO(d) { return d.toISOString().slice(0,10); }
  function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }

  async function loadAnalytics() {
    const qs = new URLSearchParams();
    if (currentFrom) qs.set('from', currentFrom);
    if (currentTo) qs.set('to', currentTo);
    try {
      const data = await shared.apiFetch('/api/analytics?' + qs.toString());
      renderKPIs(data);
      renderCharts(data);
    } catch(e) {
      document.getElementById('analyticsGrid').innerHTML = '<div class="empty-state"><p>Failed to load analytics</p></div>';
    }
  }

  function renderKPIs(d) {
    document.getElementById('kpiRow').innerHTML = `
      <div class="kpi-card"><div class="kpi-val">${d.total||0}</div><div class="kpi-lbl">Total Leads</div></div>
      <div class="kpi-card"><div class="kpi-val">${d.conversionRate||0}%</div><div class="kpi-lbl">Conversion Rate</div></div>
      <div class="kpi-card"><div class="kpi-val">${d.avgScore||0}</div><div class="kpi-lbl">Avg Lead Score</div></div>
      <div class="kpi-card"><div class="kpi-val">${d.bestArea||'—'}</div><div class="kpi-lbl">Top Area</div></div>
      <div class="kpi-card"><div class="kpi-val">${d.bestDay||'—'}</div><div class="kpi-lbl">Best Day</div></div>
    `;
  }

  function renderCharts(d) {
    const grid = document.getElementById('analyticsGrid');
    grid.innerHTML = `
      <div class="chart-card wide"><div class="chart-title">📈 Leads Trend</div><canvas id="cTrend" height="120"></canvas></div>
      <div class="chart-card"><div class="chart-title">🏠 Leads by Area</div><canvas id="cArea" height="180"></canvas></div>
      <div class="chart-card"><div class="chart-title">💰 Budget Distribution</div><canvas id="cBudget" height="180"></canvas></div>
      <div class="chart-card"><div class="chart-title">🎯 Interest Type</div><canvas id="cInterest" height="180"></canvas></div>
      <div class="chart-card"><div class="chart-title">🌐 Language Split</div><canvas id="cLang" height="180"></canvas></div>
      <div class="chart-card"><div class="chart-title">⭐ Score Distribution</div><canvas id="cScore" height="180"></canvas></div>
      <div class="chart-card"><div class="chart-title">🎙️ Voice vs Text</div><canvas id="cSource" height="180"></canvas></div>
      <div class="chart-card wide"><div class="chart-title">🕐 Hourly Activity Heatmap</div>
        <div class="heatmap" id="heatmap"></div>
        <div class="heatmap-label">${Array.from({length:24},(_,i)=>`<span>${i}h</span>`).join('')}</div>
      </div>
    `;
    makeChart('cTrend','line', d.trend?.labels||[], [{label:'Leads',data:d.trend?.counts||[],borderColor:'#3D7FFA',backgroundColor:'rgba(61,127,250,.1)',tension:.3,fill:true}]);
    makeChart('cArea','bar', Object.keys(d.byArea||{}), [{label:'Leads',data:Object.values(d.byArea||{}),backgroundColor:'#3D7FFA'}], {indexAxis:'y'});
    makeChart('cBudget','doughnut', Object.keys(d.byBudget||{}), [{data:Object.values(d.byBudget||{}),backgroundColor:['#3D7FFA','#06C8E0','#10B981','#F59E0B','#EF4444']}]);
    makeChart('cInterest','doughnut', Object.keys(d.byInterest||{}), [{data:Object.values(d.byInterest||{}),backgroundColor:['#7C3AED','#10B981','#F59E0B']}]);
    makeChart('cLang','doughnut', ['Arabic','English'], [{data:[d.arabic||0,d.english||0],backgroundColor:['#7C3AED','#3D7FFA']}]);
    makeChart('cScore','bar', Object.keys(d.scoreDistribution||{}), [{label:'Leads',data:Object.values(d.scoreDistribution||{}),backgroundColor:'#10B981'}]);
    makeChart('cSource','doughnut', ['Voice','Text'], [{data:[d.voice||0,d.text||0],backgroundColor:['#06C8E0','#3D7FFA']}]);
    // Heatmap
    const hm = document.getElementById('heatmap');
    const hourCounts = d.hourly||{};
    const maxH = Math.max(...Object.values(hourCounts),1);
    hm.innerHTML = Array.from({length:24},(_,h)=>{
      const v=hourCounts[h]||0;
      const intensity = Math.round((v/maxH)*100);
      return `<div class="heatmap-cell" style="background:rgba(61,127,250,${intensity/100})" title="${h}:00 — ${v} leads"></div>`;
    }).join('');
  }

  function makeChart(id, type, labels, datasets, extra={}) {
    if (charts[id]) charts[id].destroy();
    const ctx = document.getElementById(id)?.getContext('2d');
    if (!ctx) return;
    charts[id] = new Chart(ctx, { type, data:{labels,datasets}, options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:type==='bar'||type==='line'?{y:{beginAtZero:true}}:undefined,...extra} });
  }

  // Default: last 7 days
  const now = new Date();
  currentFrom = new Date(now); currentFrom.setDate(now.getDate()-7);
  currentFrom = currentFrom.toISOString().slice(0,10);
  currentTo = now.toISOString().slice(0,10);
  await loadAnalytics();
})();
</script>
