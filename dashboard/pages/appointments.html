<style>
  .pg-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .pg-title{font-size:18px;font-weight:700;color:#1e293b;flex:1}
  .filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .dr-btn{padding:6px 14px;border:1px solid #e2e8f0;background:#f1f5f9;font-size:12px;font-weight:500;cursor:pointer;color:#64748b;transition:all .15s}
  .dr-btn.active{background:#4F86C6;color:#fff;border-color:#4F86C6}
  .status-filter{padding:6px 12px;border:1px solid #e2e8f0;background:#fff;font-size:12px;cursor:pointer;color:#1e293b}
  .export-btn{padding:7px 16px;background:#4F86C6;color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer}
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .kpi-card{background:#fff;padding:16px 20px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .kpi-val{font-size:24px;font-weight:700;color:#1e293b}
  .kpi-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-top:4px}
  .kpi-card.blue .kpi-val{color:#4F86C6}
  .kpi-card.green .kpi-val{color:#62B58F}
  .kpi-card.purple .kpi-val{color:#9B7FD4}
  .view-toggle{display:flex;gap:6px;margin-bottom:14px}
  .vt-btn{padding:6px 14px;border:1px solid #e2e8f0;background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:#64748b}
  .vt-btn.active{background:#4F86C6;color:#fff;border-color:#4F86C6}
  .tbl-wrap{background:#fff;border:1px solid #e2e8f0;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .tbl-wrap table{width:100%;border-collapse:collapse}
  .tbl-wrap thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;background:#f8fafc;border-bottom:2px solid #e2e8f0;white-space:nowrap}
  .tbl-wrap tbody tr{transition:background .1s}
  .tbl-wrap tbody tr:hover td{background:#f8fafc}
  .tbl-wrap td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;color:#1e293b;vertical-align:middle}
  .appt-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#7C3AED);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
  .lead-cell{display:flex;align-items:center;gap:10px}
  .lead-name{font-weight:600;color:#1e293b;font-size:13px}
  .lead-wa{font-size:11px;color:#94a3b8}
  .date-badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px}
  .date-today{background:#D1FAE5;color:#065F46}
  .date-future{background:#DBEAFE;color:#1E40AF}
  .date-overdue{background:#FEE2E2;color:#991B1B}
  .industry-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:capitalize}
  .industry-realEstate{background:#DBEAFE;color:#1E40AF}
  .industry-restaurant{background:#D1FAE5;color:#065F46}
  .industry-clinic{background:#FCE7F3;color:#9D174D}
  .industry-salon{background:#FEF3C7;color:#92400E}
  .industry-retail{background:#EDE9FE;color:#5B21B6}
  .industry-carDealer{background:#F3F4F6;color:#374151}
  .status-pill{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
  .status-confirmed{background:#DBEAFE;color:#1E40AF}
  .status-completed{background:#D1FAE5;color:#065F46}
  .status-cancelled{background:#F3F4F6;color:#6B7280}
  .status-rescheduled{background:#FEF3C7;color:#92400E}
  .appt-score-hot{background:#FEE2E2;color:#991B1B;font-size:11px;padding:2px 7px;border-radius:8px;font-weight:700}
  .appt-score-warm{background:#FEF3C7;color:#92400E;font-size:11px;padding:2px 7px;border-radius:8px;font-weight:700}
  .appt-score-cold{background:#DBEAFE;color:#1E40AF;font-size:11px;padding:2px 7px;border-radius:8px;font-weight:700}
  .action-btns{display:flex;gap:4px;flex-wrap:wrap}
  .ab{padding:4px 8px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
  .ab-complete{background:#D1FAE5;color:#065F46}
  .ab-complete:hover{background:#10B981;color:#fff}
  .ab-cancel{background:#FEE2E2;color:#991B1B}
  .ab-cancel:hover{background:#EF4444;color:#fff}
  .ab-wa{background:#D1FAE5;color:#25D366}
  .ab-wa:hover{background:#25D366;color:#fff}
  .appt-empty{text-align:center;padding:48px 24px;color:#9CA3AF}
  .appt-empty-icon{font-size:40px;margin-bottom:12px}
  .calendar-view{display:none}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-day{background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:10px;min-height:100px}
  .cal-day-header{font-size:11px;font-weight:700;color:#6B7280;margin-bottom:6px;text-align:center}
  .cal-day-date{font-size:16px;font-weight:800;color:#111827;text-align:center;margin-bottom:6px}
  .cal-day.today{border-color:#3B82F6;background:#EFF6FF}
  .cal-day.today .cal-day-date{color:#3B82F6}
  .cal-appt{background:#3B82F6;color:#fff;border-radius:5px;padding:3px 6px;font-size:10px;font-weight:600;margin-bottom:3px;cursor:pointer}
  .cal-appt.completed{background:#10B981}
  .cal-appt.cancelled{background:#9CA3AF}
  .appt-loading{text-align:center;padding:40px;color:#9CA3AF;font-size:14px}
  @media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}.cal-grid{grid-template-columns:repeat(3,1fr)}}
</style>

<div class="pg-hdr">
  <div class="pg-title">📅 Appointments</div>
  <div class="filter-row">
    <button class="dr-btn active" onclick="apptSetRange('today',this)">Today</button>
    <button class="dr-btn" onclick="apptSetRange('week',this)">This Week</button>
    <button class="dr-btn" onclick="apptSetRange('month',this)">This Month</button>
    <button class="dr-btn" onclick="apptSetRange('all',this)">All</button>
    <select class="status-filter" id="apptStatusFilter" onchange="apptRender()">
      <option value="">All Statuses</option>
      <option value="confirmed">Confirmed</option>
      <option value="completed">Completed</option>
      <option value="cancelled">Cancelled</option>
      <option value="rescheduled">Rescheduled</option>
    </select>
    <button class="export-btn" onclick="apptExportCSV()">Export CSV</button>
  </div>
</div>

<div class="kpi-row">
  <div class="kpi-card blue"><div class="kpi-val" id="kToday">—</div><div class="kpi-lbl">Today's Appointments</div></div>
  <div class="kpi-card"><div class="kpi-val" id="kWeek">—</div><div class="kpi-lbl">This Week</div></div>
  <div class="kpi-card green"><div class="kpi-val" id="kRate">—%</div><div class="kpi-lbl">Completion Rate</div></div>
  <div class="kpi-card purple"><div class="kpi-val" id="kTotal">—</div><div class="kpi-lbl">Total Booked</div></div>
</div>

<div class="view-toggle">
  <button class="vt-btn active" onclick="apptSetView('table',this)">Table View</button>
  <button class="vt-btn" onclick="apptSetView('calendar',this)">Calendar View</button>
</div>

<div class="tbl-wrap" id="apptTableView">
  <div class="appt-loading" id="apptLoadingMsg">Loading appointments...</div>
  <table id="apptTable" style="display:none">
    <thead>
      <tr>
        <th>Client</th>
        <th>Date</th>
        <th>Time Slot</th>
        <th>Industry</th>
        <th>Score</th>
        <th>Status</th>
        <th>Agent</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="apptBody"></tbody>
  </table>
  <div class="appt-empty" id="apptEmptyState" style="display:none">
    <div class="appt-empty-icon">📅</div>
    <div style="font-weight:600;font-size:15px;color:#374151;margin-bottom:6px">No appointments found</div>
    <div style="font-size:13px">Appointments will appear here once leads book via the bot</div>
  </div>
</div>

<div class="calendar-view" id="apptCalendarView">
  <div class="cal-grid" id="calGrid"></div>
</div>

<script>
(function() {
  let allAppointments = [];
  let currentRange = 'today';

  async function init() {
    const [appts, stats] = await Promise.all([
      shared.apiFetch('/api/appointments').catch(() => []),
      shared.apiFetch('/api/appointments/stats').catch(() => ({})),
    ]);
    allAppointments = Array.isArray(appts) ? appts : [];

    document.getElementById('kToday').textContent = stats.today ?? '0';
    document.getElementById('kWeek').textContent  = stats.this_week ?? '0';
    document.getElementById('kRate').textContent  = (stats.completion_rate ?? 0) + '%';
    document.getElementById('kTotal').textContent = stats.total ?? allAppointments.length;

    const nb = document.getElementById('nbAppts');
    if (nb) nb.textContent = stats.today ?? '0';

    apptRender();
  }

  window.apptSetRange = function(range, btn) {
    currentRange = range;
    document.querySelectorAll('.dr-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    apptRender();
  };

  function filterByRange(appts) {
    const now = new Date();
    const todayStart = new Date(now); todayStart.setHours(0,0,0,0);
    const todayEnd   = new Date(now); todayEnd.setHours(23,59,59,999);
    const weekEnd    = new Date(now.getTime() + 7*86400000);
    const monthEnd   = new Date(now.getFullYear(), now.getMonth()+1, 1);
    return appts.filter(a => {
      const d = a.appointment_date ? new Date(a.appointment_date) : null;
      if (!d) return currentRange === 'all';
      if (currentRange === 'today')  return d >= todayStart && d <= todayEnd;
      if (currentRange === 'week')   return d >= todayStart && d <= weekEnd;
      if (currentRange === 'month')  return d >= todayStart && d <= monthEnd;
      return true;
    });
  }

  window.apptRender = function() {
    const statusFilter = document.getElementById('apptStatusFilter').value;
    let filtered = filterByRange(allAppointments);
    if (statusFilter) filtered = filtered.filter(a => a.status === statusFilter);
    filtered.sort((a,b) => new Date(a.appointment_date) - new Date(b.appointment_date));

    const tbody   = document.getElementById('apptBody');
    const table   = document.getElementById('apptTable');
    const empty   = document.getElementById('apptEmptyState');
    const loading = document.getElementById('apptLoadingMsg');
    loading.style.display = 'none';

    if (!filtered.length) {
      table.style.display = 'none';
      empty.style.display = 'block';
    } else {
      table.style.display = 'table';
      empty.style.display = 'none';
      tbody.innerHTML = filtered.map(apptRow).join('');
    }
    renderCalendar(filtered);
  };

  function dateClass(appt) {
    if (!appt.appointment_date) return '';
    const d = new Date(appt.appointment_date);
    const now = new Date();
    const todayStart = new Date(now); todayStart.setHours(0,0,0,0);
    const todayEnd   = new Date(now); todayEnd.setHours(23,59,59,999);
    if (d < todayStart && appt.status !== 'completed' && appt.status !== 'cancelled') return 'date-overdue';
    if (d >= todayStart && d <= todayEnd) return 'date-today';
    return 'date-future';
  }

  function scoreBadge(score) {
    if (score >= 8) return `<span class="appt-score-hot">HOT ${score}/10</span>`;
    if (score >= 5) return `<span class="appt-score-warm">WARM ${score}/10</span>`;
    return `<span class="appt-score-cold">COLD ${score}/10</span>`;
  }

  function initials(name) {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  }

  function apptRow(a) {
    const display = a.appointment_date_display || a.slot_date || '—';
    const dc = dateClass(a);
    const industry = (a.industry || 'realEstate').replace(/([A-Z])/g,' $1').trim();
    const industryClass = 'industry-' + (a.industry || 'realEstate');
    return `<tr>
      <td>
        <div class="lead-cell">
          <div class="appt-av">${initials(a.lead_name)}</div>
          <div>
            <div class="lead-name">${a.lead_name || 'Unknown'}</div>
            <div class="lead-wa">${a.wa_number ? '+'+a.wa_number : '—'}</div>
          </div>
        </div>
      </td>
      <td><span class="date-badge ${dc}">${display}</span></td>
      <td style="font-size:12px;color:#374151">${a.time_slot || a.slot_time || '—'}</td>
      <td><span class="industry-badge ${industryClass}">${industry}</span></td>
      <td>${scoreBadge(a.lead_score ?? a.score ?? 0)}</td>
      <td><span class="status-pill status-${a.status || 'confirmed'}">${a.status || 'confirmed'}</span></td>
      <td style="font-size:12px;color:#6B7280">${a.agent_wa || '—'}</td>
      <td>
        <div class="action-btns">
          <button class="ab ab-complete" onclick="apptUpdateStatus('${a.id}','completed',this)">✓ Complete</button>
          <button class="ab ab-cancel" onclick="apptUpdateStatus('${a.id}','cancelled',this)">✕ Cancel</button>
          ${a.wa_number ? `<button class="ab ab-wa" onclick="window.open('https://wa.me/${a.wa_number}','_blank')">💬 WA</button>` : ''}
        </div>
      </td>
    </tr>`;
  }

  window.apptUpdateStatus = async function(id, status, btn) {
    btn.disabled = true;
    try {
      await fetch(`/api/appointments/${id}/status`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ status }),
      });
      await init();
    } catch(e) {
      btn.disabled = false;
      alert('Failed to update: ' + e.message);
    }
  };

  window.apptSetView = function(view, btn) {
    document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('apptTableView').style.display    = view === 'table'    ? '' : 'none';
    document.getElementById('apptCalendarView').style.display = view === 'calendar' ? 'block' : 'none';
    if (view === 'calendar') renderCalendar(allAppointments);
  };

  function renderCalendar(appts) {
    const grid = document.getElementById('calGrid');
    if (!grid) return;
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDate = new Date(year, month + 1, 0).getDate();
    const monthName = now.toLocaleString('en-AE', { month: 'long', year: 'numeric' });

    // Build header with month label
    const header = `<div style="grid-column:1/-1;font-size:14px;font-weight:700;color:#111827;margin-bottom:8px;padding:4px 0">${monthName}</div>`;
    const dayHeaders = days.map(d => `<div style="text-align:center;font-size:11px;font-weight:700;color:#6B7280;padding:6px 0;border-bottom:2px solid #E5E7EB">${d}</div>`).join('');

    // Leading empty cells for days before the 1st
    const startPad = Array.from({length: firstDay.getDay()}, () => '<div class="cal-day" style="background:#F9FAFB;opacity:.5"></div>').join('');

    // Day cells
    const dayCells = Array.from({length: lastDate}, (_, i) => {
      const day = i + 1;
      const d = new Date(year, month, day);
      const isToday = d.toDateString() === now.toDateString();
      const dayAppts = appts.filter(a => {
        if (!a.appointment_date) return false;
        const ad = new Date(a.appointment_date);
        return ad.getFullYear() === year && ad.getMonth() === month && ad.getDate() === day;
      });
      return `<div class="cal-day${isToday?' today':''}">
        <div class="cal-day-date">${day}</div>
        ${dayAppts.map(a => `<div class="cal-appt ${a.status||''}" title="${a.lead_name||''}${a.time_slot?' · '+a.time_slot:''}">${(a.lead_name||'?').split(' ')[0]}</div>`).join('')}
      </div>`;
    }).join('');

    grid.innerHTML = header + dayHeaders + startPad + dayCells;
  }

  window.apptExportCSV = function() {
    const headers = ['Name','WhatsApp','Date','Time Slot','Industry','Score','Status'];
    const rows = allAppointments.map(a => [
      a.lead_name||'', a.wa_number||'',
      a.appointment_date_display||a.slot_date||'',
      a.time_slot||'', a.industry||'',
      a.lead_score||0, a.status||''
    ].map(v => `"${v}"`).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'appointments.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  init();
})();
</script>
