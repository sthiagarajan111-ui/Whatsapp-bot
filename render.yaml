services:
  - type: web
    name: whatsapp-realestate-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    nodeVersion: "22"
    healthCheckPath: /health

    # Persistent disk so SQLite data survives deploys
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ACTIVE_FLOW
        value: realEstate
      # Set these in the Render dashboard (do NOT commit real values)
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: OWNER_WHATSAPP
        sync: false
      - key: CLIENT_NAME
        sync: false
